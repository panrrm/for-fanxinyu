<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 范鑫雨 · 二十而丽 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff0f8 0%, #ffe2f0 30%, #fff0f5 70%, #fff5fd 100%);
            background-size: 400% 400%;
            animation: galaxyFlow 20s ease infinite;
            overflow-x: hidden;
            position: relative;
        }
        
        @keyframes galaxyFlow {
            0% { background-position: 0% 0%; }
            25% { background-position: 50% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 50% 50%; }
            100% { background-position: 0% 0%; }
        }
        
        body::after {
            content: '';
            position: fixed;
            inset: -100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 200, 230, 0.25) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 220, 180, 0.2) 0%, transparent 50%);
            animation: spinGlow 35s linear infinite;
            pointer-events: none;
            z-index: -2;
        }
        
        @keyframes spinGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .fx-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        /* ===== 密码页 ===== */
        #pwdPage {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            animation: entryZoom 1s ease;
        }
        
        @keyframes entryZoom {
            0% { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(5px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        
        .pwd-card {
            background: rgba(255, 248, 250, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 45px 35px;
            box-shadow: 0 40px 70px rgba(255, 100, 150, 0.35), 0 0 0 2px rgba(255, 255, 255, 0.5) inset;
            border: 2px solid rgba(255, 255, 255, 0.8);
            max-width: 420px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .pwd-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 200, 230, 0.4) 0%, transparent 60%);
            animation: rotateBg 25s linear infinite;
            pointer-events: none;
        }
        
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .pwd-card h1 {
            color: #ff6b9d;
            font-size: clamp(30px, 8vw, 38px);
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 5px 15px rgba(255, 130, 170, 0.4);
            position: relative;
            z-index: 2;
            text-align: center;
        }
        
        .pwd-card h1::after {
            content: '';
            display: block;
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, #ff85b3, #ffbc7a, #ffd966, #ff85b3);
            background-size: 300% auto;
            border-radius: 4px;
            margin: 15px auto 10px;
            animation: shimmer 4s linear infinite;
        }
        
        @keyframes shimmer {
            to { background-position: 300% center; }
        }
        
        .pwd-subtitle {
            color: #b36b87;
            font-size: 17px;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }
        
        .input-group {
            margin-bottom: 18px;
        }
        
        .input-group label {
            display: block;
            color: #b35f80;
            font-size: 15px;
            margin-bottom: 6px;
            padding-left: 18px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            height: 58px;
            font-size: 20px;
            padding: 0 25px;
            border: 2px solid #ffbfd5;
            border-radius: 40px;
            outline: none;
            background: white;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 200, 220, 0.3);
            -webkit-appearance: none;
        }
        
        .form-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 8px rgba(255, 107, 157, 0.15), 0 5px 15px #ffc0d0;
            transform: translateY(-2px);
        }
        
        #pwdPage button {
            width: 100%;
            height: 60px;
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff7aa8, #ffaa77);
            border: none;
            border-radius: 40px;
            color: white;
            margin-top: 20px;
            box-shadow: 0 20px 30px rgba(255, 110, 140, 0.4);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
        }
        
        #pwdPage button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }
        
        #pwdPage button:hover::before {
            left: 100%;
        }
        
        #pwdPage button:active {
            transform: scale(0.98);
        }
        
        .error {
            color: #e03a5e;
            background: rgba(255, 220, 230, 0.9);
            border-radius: 40px;
            padding: 12px;
            margin-top: 18px;
            font-size: 16px;
            display: none;
            text-align: center;
            border: 1px solid #ffa0b0;
        }

        /* ===== 蛋糕页 ===== */
        #cakePage {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 15px 25px;
            position: relative;
            z-index: 10;
            background: radial-gradient(circle at 20% 30%, #ffeef7, #fff5fa 50%, #fffaff 100%);
            animation: bloomIn 1.2s ease;
        }
        
        @keyframes bloomIn {
            0% { opacity: 0; filter: blur(10px); }
            100% { opacity: 1; filter: blur(0); }
        }
        
        #cakePage::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 15% 25%, #fff, transparent),
                radial-gradient(2px 2px at 75% 35%, #fff, transparent),
                radial-gradient(3px 3px at 45% 70%, #ffd1dc, transparent),
                radial-gradient(2px 2px at 85% 80%, #ffd1dc, transparent),
                radial-gradient(3px 3px at 25% 90%, #fff, transparent);
            background-size: 300px 300px;
            animation: sparkleBg 8s linear infinite;
            z-index: 0;
            pointer-events: none;
        }
        
        @keyframes sparkleBg {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
        
        #cakePage h1 {
            font-size: clamp(32px, 8vw, 42px);
            margin: 0 0 8px 0;
            text-align: center;
            background: linear-gradient(145deg, #ff6b9d, #ff9f7a, #ffd966, #ff9f7a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 150, 200, 0.5);
            animation: titleGlow 3s infinite alternate;
            position: relative;
            line-height: 1.3;
            z-index: 2;
        }
        
        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 10px #ffb8d0); }
            to { filter: drop-shadow(0 0 30px #ff9ec0); }
        }
        
        #cakePage h1::before,
        #cakePage h1::after {
            content: '🎀';
            font-size: 28px;
            margin: 0 8px;
            animation: bowWave 2.5s infinite alternate;
            display: inline-block;
            -webkit-text-fill-color: initial;
            color: #ff8da1;
            filter: drop-shadow(0 3px 8px #ffb0c0);
        }
        
        @keyframes bowWave {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-12px) rotate(8deg); }
        }
        
        .cake-subtitle {
            color: #b35f80;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px #ffe2ed;
            text-align: center;
            z-index: 2;
            position: relative;
        }
        
        .cake-container {
            position: relative;
            margin: 5px 0 20px;
            transform: scale(1.1);
            filter: drop-shadow(0 30px 35px rgba(255, 100, 150, 0.4));
            transition: 0.5s;
            max-width: 340px;
            width: 100%;
            z-index: 5;
        }
        
        .cake-container:hover {
            filter: drop-shadow(0 40px 45px #ffa5c0);
            transform: scale(1.15);
        }
        
        #cake {
            width: 100%;
            height: auto;
            display: block;
            animation: majesticFloat 3.2s infinite alternate ease-in-out;
            filter: brightness(1.02) contrast(1.02);
        }
        
        @keyframes majesticFloat {
            0% { transform: translateY(0) rotate(-0.8deg); }
            100% { transform: translateY(-18px) rotate(1.2deg); }
        }
        
        /* 蜡烛 - 向下移动（从2%改为8%） */
        .velas {
            display: flex;
            gap: 18px;
            justify-content: center;
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            width: 100%;
        }
        
        .vela {
            width: 13px;
            height: 48px;
            background: linear-gradient(145deg, #f8f8f8, #e0e0e0, #f0f0f0);
            border-radius: 5px 5px 0 0;
            box-shadow: inset 0 -8px 8px #b8b8b8, 0 10px 15px rgba(0,0,0,0.15);
            position: relative;
            animation: candleSway 3s infinite alternate;
            transform-origin: bottom center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .vela:hover {
            transform: scale(1.15);
            filter: brightness(1.2);
        }
        
        @keyframes candleSway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2.5deg); }
        }
        
        .vela::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 2px;
            right: 2px;
            height: 7px;
            background: linear-gradient(90deg, #ffaa7a, #ff6b9d, #ffd966, #ffaa7a);
            background-size: 300% auto;
            border-radius: 4px 4px 0 0;
            animation: candleShine 3s linear infinite;
            box-shadow: 0 0 15px #ffaa7a;
        }
        
        @keyframes candleShine {
            to { background-position: 300% center; }
        }
        
        .fuego {
            width: 24px;
            height: 45px;
            background: radial-gradient(circle at 50% 80%, #fffef0, #ffb84d, #ff6b4a);
            border-radius: 50% 50% 30% 30%;
            position: relative;
            top: -34px;
            left: -5px;
            filter: blur(1.5px);
            box-shadow: 0 0 40px #ffb347, 0 0 70px #ff8c5a;
            animation: flameDance 0.8s infinite alternate ease-in-out;
            transition: all 0.3s ease;
        }
        
        .fuego::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            background: radial-gradient(circle, rgba(255, 220, 100, 0.4), transparent 70%);
            border-radius: 50%;
            animation: flameGlow 1.5s infinite alternate;
            pointer-events: none;
        }
        
        @keyframes flameGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.3); }
        }
        
        @keyframes flameDance {
            0% { transform: scale(1) translateY(0) rotate(-2deg); opacity: 0.95; }
            100% { transform: scale(1.3) translateY(-14px) rotate(3deg); opacity: 1; }
        }
        
        .fuego.blown {
            opacity: 0;
            transform: scale(0);
            animation: none;
            box-shadow: none;
        }
        
        .fuego.blown::before {
            display: none;
        }
        
        .velas.blown .vela {
            animation: none;
        }
        
        .smoke-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(200,200,200,0.4), transparent);
            border-radius: 50%;
            filter: blur(8px);
            animation: smokeRise 2s ease-out forwards;
            pointer-events: none;
            z-index: 20;
        }
        
        @keyframes smokeRise {
            0% { opacity: 0.8; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-60px) scale(2.5); }
        }
        
        .cake-decoration {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .cake-sparkle {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fffdf0;
            border-radius: 50%;
            box-shadow: 0 0 25px #ffd9e5, 0 0 45px #ffa8c5;
            animation: sparkleDance 1.8s infinite alternate;
        }
        
        @keyframes sparkleDance {
            0% { opacity: 0.3; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.5); }
        }
        
        .cake-container::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -15px;
            transform: translateX(-50%);
            width: 280px;
            height: 80px;
            background: radial-gradient(circle, rgba(255, 140, 180, 0.6) 0%, transparent 80%);
            border-radius: 50%;
            filter: blur(25px);
            z-index: -1;
            animation: glowPulse 3.5s infinite alternate;
        }
        
        @keyframes glowPulse {
            from { opacity: 0.5; width: 260px; }
            to { opacity: 1; width: 320px; }
        }
        
        .wish-text {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 600;
            color: #d44e78;
            box-shadow: 0 20px 35px rgba(255, 130, 170, 0.4);
            border: 2px solid #ffd9e5;
            opacity: 0;
            transition: 0.5s;
            white-space: nowrap;
            z-index: 20;
            letter-spacing: 1px;
        }
        
        .wish-text.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.15);
            box-shadow: 0 25px 45px #ffa5c0;
        }
        
        .cake-btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0 12px;
            z-index: 10;
            position: relative;
        }
        
        .cake-func-btn {
            padding: 12px 28px;
            font-size: 18px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid #ffbfd5;
            border-radius: 40px;
            color: #b34e71;
            box-shadow: 0 15px 25px #ffc0d0;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            letter-spacing: 1px;
        }
        
        .cake-func-btn:hover {
            background: #ffe2ed;
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 22px 35px #ff9eb5;
            border-color: #ff8fb0;
        }
        
        .cake-func-btn:active {
            transform: scale(0.98);
        }
        
        .main-btn {
            padding: 16px 60px;
            font-size: 22px;
            background: linear-gradient(135deg, #ff77a8, #ffaa77);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            box-shadow: 0 25px 40px #ff90b0;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        
        .main-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }
        
        .main-btn:hover::before {
            left: 100%;
        }
        
        .main-btn:active {
            transform: scale(0.97);
        }

        /* ===== 主页面 ===== */
        #mainPage {
            display: none;
            padding: 25px 15px 35px;
            position: relative;
            z-index: 10;
            animation: fadeReveal 1s;
        }
        
        @keyframes fadeReveal {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #mainPage h1 {
            color: #c45a7a;
            font-size: clamp(26px, 7vw, 34px);
            margin-bottom: 20px;
            text-shadow: 0 5px 15px #ffc0d0;
            text-align: center;
            line-height: 1.4;
            padding: 0 10px;
        }
        
        .carousel-box {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3/4;
            margin: 0 auto 20px;
            border-radius: 40px;
            background: white;
            box-shadow: 0 25px 40px #ffbfcf;
            border: 4px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, #ff99bb, #ffc090, #ffe085, #ff99bb) border-box;
            background-size: 300% 300%;
            animation: borderGlow 8s ease infinite;
            overflow: hidden;
            transition: 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        .carousel-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 55px #ffa5ba;
        }
        
        .carousel-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background-color: #fff5f9;
            border-radius: 36px;
            opacity: 0;
            animation: crossFade 40s linear infinite;
            padding: 10px;
            box-shadow: inset 0 0 0 1px rgba(255, 200, 220, 0.3);
        }
        
        @keyframes crossFade {
            0% { opacity: 0; transform: scale(0.98); }
            4% { opacity: 1; transform: scale(1); }
            10% { opacity: 1; transform: scale(1); }
            14% { opacity: 0; transform: scale(1.02); }
            100% { opacity: 0; }
        }
        
        .img1 { animation-delay: 0s; }
        .img2 { animation-delay: 4s; }
        .img3 { animation-delay: 8s; }
        .img4 { animation-delay: 12s; }
        .img5 { animation-delay: 16s; }
        .img6 { animation-delay: 20s; }
        .img7 { animation-delay: 24s; }
        .img8 { animation-delay: 28s; }
        .img9 { animation-delay: 32s; }
        .img10 { animation-delay: 36s; }

        /* 打字机容器 - 图片播放完后显示，且背景变空白 */
        .typewriter-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 360px;
            background: rgba(255, 245, 250, 0.97);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 28px 25px;
            border-radius: 50px;
            box-shadow: 0 30px 50px rgba(255, 100, 150, 0.35), 0 0 0 3px rgba(255, 255, 255, 0.8) inset;
            border: 2px solid white;
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 30;
            pointer-events: none;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .typewriter-container.show {
            opacity: 1;
        }
        
        .typewriter-text {
            font-size: 17px;
            line-height: 1.8;
            color: #b33b66;
            text-align: center;
            white-space: pre-wrap;
            word-wrap: break-word;
            border-right: 3px solid #ff88b0;
            animation: blink 1s step-end infinite;
            padding: 5px;
            max-height: 60vh;
            overflow-y: auto;
            font-weight: 500;
            text-shadow: 0 2px 8px #ffd0e0;
        }
        
        @keyframes blink {
            50% { border-color: transparent; }
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 25px 0;
        }
        
        .func-btn {
            padding: 14px 30px;
            font-size: 18px;
            background: white;
            border: 2px solid #ffbfd0;
            border-radius: 40px;
            color: #b34b70;
            font-weight: 600;
            box-shadow: 0 15px 25px #ffc0d0;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 1px;
        }
        
        .func-btn:hover {
            background: #ffecf2;
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 25px 35px #ffa0b8;
            border-color: #ff8fb2;
        }
        
        .func-btn:active {
            transform: scale(0.97);
        }
        
        .footer-signature {
            font-size: 18px;
            color: #bc5277;
            margin-top: 30px;
            animation: gentleGlow 3s infinite alternate;
            text-align: center;
            padding: 0 15px;
        }
        
        @keyframes gentleGlow {
            from { text-shadow: 0 0 8px #ffbfd5; }
            to { text-shadow: 0 0 25px #ff96b8; }
        }

        /* 弹窗 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
            animation: modalFade 0.4s;
        }
        
        @keyframes modalFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            max-width: 400px;
            width: 100%;
            padding: 35px 30px;
            border-radius: 50px;
            box-shadow: 0 40px 70px #d98fa8;

        @keyframes riseUp {

            10% { opacity: 1; transform: translateY(80vh) rotate(5deg) scale(1); }
            50% { opacity: 1; transform: translateY(40vh) rotate(-5deg) scale(1.2); }

        // 彩带特效

            const colors = ['#ff8daf', '#ffbc7a', '#ffe07a', '#b2e0b2', '#ffb2d9', '#ff99bb'];
            let count = 0;
            
            confettiInterval = setInterval(() => {
                if (count++ > 60) {
                    clearInterval(confettiInterval);
                    setTimeout(() => {
                        layer.style.display = 'none';
                        layer.innerHTML = '';
                    }, 3000);
                    return;
                }
                
                const confetti = document.createElement('div');
                const size = Math.random() * 15 + 8;
                const isLong = Math.random() > 0.7;
                
                confetti.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${isLong ? size * 2.5 : size}px;

        // 烟花特效

            const colors = ['#ff7ca8', '#ffb077', '#ffdb77', '#ff8fb0', '#ffb2d9', '#ff99bb'];

                setTimeout(() => {
                    const x = Math.random() * 60 + 20;
                    const y = Math.random() * 30 + 35;
                    
                    for (let s = 0; s < 24; s++) {
                        const angle = (s / 24) * Math.PI * 2;
                        const dist = Math.random() * 80 + 40;
                        
                        setTimeout(() => {
                            for (let p = 0; p < 3; p++) {

            document.getElementById('hearts').style.display = 'none';
            document.getElementById('hearts').innerHTML = '';
            
            createConfetti();
            
            // 生日飘字 - 持续特效
            setInterval(() => {
                const span = document.createElement('div');
                span.className = 'birthday-float';
                const texts = ['20岁快乐 ✨', '平安顺遂 🎈', '万事胜意 🎂', '永远开心 ❤️', '前程似锦 🌟'];
                span.innerText = texts[Math.floor(Math.random() * texts.length)];
                span.style.left = Math.random() * 70 + 15 + '%';
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 8000);
            }, 2000);
            
            // 40秒后显示文字，并且图片停止播放
            setTimeout(() => {
                // 停止图片轮播
                document.querySelectorAll('.carousel-img').forEach(img => {
                    img.style.animation = 'none';
                    img.style.opacity = '0';
                });
                
                // 显示打字机文字
                typeContainer.classList.add('show');
                typeWrite(birthdayWords);
                textDisplayed = true;
            }, 40000);
        };

        function typeWrite(str, i = 0) {
            clearTimeout(typeTimer);
            typeText.textContent = '';
            
            function run() {
                if (i < str.length) {
                    typeText.textContent += str[i];
                    i++;
                    
                    let delay = 60;
                    const char = str[i-1];
                    if (char === '\n') delay = 250;
                    else if (char === '，' || char === '。' || char === '！') delay = 150;
                    
                    typeTimer = setTimeout(run, delay);
                    
                    setTimeout(() => {
                        typeText.scrollTop = typeText.scrollHeight;
                    }, 10);
                }
            }
            run();
        }

        window.restartCarousel = function() {
            typeContainer.classList.remove('show');
            clearTimeout(typeTimer);
            typeText.textContent = '';
            textDisplayed = false;
            
            // 重置图片动画
            document.querySelectorAll('.carousel-img').forEach(img => {
                img.style.animation = 'none';
                img.offsetHeight;
                img.style.animation = 'crossFade 40s linear infinite';
                img.style.opacity = '';
            });
            
            // 重新设置40秒后显示文字，并停止图片
            setTimeout(() => {
                document.querySelectorAll('.carousel-img').forEach(img => {
                    img.style.animation = 'none';
                    img.style.opacity = '0';
                });
                
                typeContainer.classList.add('show');
                typeWrite(birthdayWords);
                textDisplayed = true;
            }, 40000);
        };

        window.openModal = function(which) {
            document.getElementById(which + 'Modal').classList.add('show');
        };

        window.closeModal = function() {
            document.querySelectorAll('.modal').forEach(m => {
                m.classList.remove('show');
            });
        };

        window.onload = function() {
            setTimeout(() => {
                document.getElementById('userInput').focus();
            }, 300);
        };
    </script>
</body>
</html>
