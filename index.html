<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝范鑫雨20岁生日快乐</title>
    <style>
        /* 基础样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #fff5f7 0%, #ffe6ef 100%);
            text-align: center;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            cursor: default;
        }

        /* 全局粒子背景 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 特效容器 */
        #confetti, #hearts, #fireworks, #sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        /* 密码页 */
        #pwdPage {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            animation: pageFadeIn 1.2s ease-out;
        }
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 密码页卡片 */
        .pwd-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            max-width: 420px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .pwd-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 107, 157, 0.05) 0%, transparent 70%);
            animation: rotateBg 8s linear infinite;
        }
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .pwd-card h1 {
            color: #ff6b9d;
            font-size: 32px;
            margin-bottom: 15px;
            text-shadow: 0 2px 10px rgba(255, 107, 157, 0.2);
            position: relative;
        }
        
        .pwd-card h1::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #ff6b9d, #ffc107);
            border-radius: 2px;
            margin: 15px auto 0;
            animation: lineGrow 1.5s ease-out;
        }
        @keyframes lineGrow {
            from { width: 0; }
            to { width: 80px; }
        }
        
        .pwd-subtitle {
            color: #999;
            font-size: 16px;
            margin-bottom: 20px;
            animation: fadeInUp 1.5s ease;
        }

        /* 账号密码输入框组 */
        .input-group {
            width: 100%;
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 5px;
        }
        .form-input {
            width: 100%;
            height: 56px;
            font-size: 20px;
            padding: 0 20px;
            border: 2px solid #ffccd5;
            border-radius: 30px;
            outline: none;
            transition: all 0.4s ease;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: inset 0 2px 8px rgba(255, 107, 157, 0.05);
            z-index: 11;
            position: relative;
        }
        
        .form-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.2);
            transform: translateY(-2px);
        }
        
        .form-input::placeholder {
            color: #d9b3bc;
            font-size: 18px;
        }

        #pwdPage button {
            width: 100%;
            height: 60px;
            font-size: 18px;
            background: linear-gradient(90deg, #ff6b9d, #ff9a76);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.3);
            position: relative;
            overflow: hidden;
            font-weight: 600;
            z-index: 11;
            margin-top: 10px;
        }
        
        #pwdPage button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.8s ease;
        }
        
        #pwdPage button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 107, 157, 0.4);
            background: linear-gradient(90deg, #ff5588, #ff8a65);
        }
        
        #pwdPage button:hover::before {
            left: 100%;
        }
        
        #pwdPage button:active {
            transform: translateY(0);
            box-shadow: 0 6px 20px rgba(255, 107, 157, 0.3);
        }

        .error {
            color: #ff4757;
            display: none;
            margin-top: 20px;
            font-size: 15px;
            animation: shake 0.6s ease, fadeIn 0.3s ease;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 71, 87, 0.05);
            border: 1px solid rgba(255, 71, 87, 0.2);
            z-index: 11;
            position: relative;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 蛋糕页（全新升级） */
        #cakePage {
            display: none;
            padding: 60px 20px;
            animation: pageFadeIn 1.2s ease-out;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        /* 蛋糕页标题 */
        #cakePage h1 {
            color: #ff6b9d;
            font-size: 42px;
            margin-bottom: 30px;
            text-shadow: 0 4px 15px rgba(255, 107, 157, 0.25);
            position: relative;
            padding: 0 20px;
            letter-spacing: 2px;
        }
        
        #cakePage h1::before, #cakePage h1::after {
            content: '🎀';
            font-size: 32px;
            margin: 0 20px;
            animation: bowFloat 2s ease-in-out infinite alternate;
        }
        @keyframes bowFloat {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-10px) rotate(5deg); }
        }
        
        /* 蛋糕副标题 */
        .cake-subtitle {
            color: #999;
            font-size: 18px;
            margin-bottom: 40px;
            animation: fadeInUp 2s ease;
        }
        
        /* 蛋糕容器（核心美化） */
        .cake-container {
            position: relative;
            margin-bottom: 50px;
            transform: scale(1.1);
            animation: cakeAppear 1.5s ease-out;
        }
        
        @keyframes cakeAppear {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.1); }
        }
        
        /* 蛋糕光晕背景 */
        .cake-container::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(circle, rgba(255,204,213,0.3) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(20px);
            z-index: -1;
        }
        
        /* 蛋糕SVG */
        #cake {
            width: 350px;
            height: auto;
            margin: 0 auto;
            animation: cakeFloat 3s ease-in-out infinite alternate;
            filter: drop-shadow(0 20px 25px rgba(255, 107, 157, 0.25));
            transition: all 0.8s ease;
        }
        
        /* 蛋糕切换动画 */
        #cake.cake-style-2 {
            filter: drop-shadow(0 20px 25px rgba(255, 193, 7, 0.25));
        }
        
        @keyframes cakeFloat {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-25px) rotate(1deg); }
        }
        
        /* 蜡烛容器（顶部位置） */
        .velas {
            display: flex;
            gap: 18px;
            justify-content: center;
            position: absolute;
            top: 2%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            transition: all 0.8s ease;
        }
        
        /* 蜡烛熄灭状态 */
        .velas.blown {
            opacity: 0.8;
        }
        
        /* 蜡烛样式 */
        .vela {
            width: 12px;
            height: 35px;
            background: linear-gradient(90deg, #f0f0f0, #e0e0e0);
            border-radius: 2px 2px 0 0;
            box-shadow: inset 0 -5px 5px rgba(0,0,0,0.1);
            position: relative;
            animation: candleSway 3s ease-in-out infinite alternate;
        }
        
        /* 蜡烛熄灭时停止摆动 */
        .velas.blown .vela {
            animation: none;
        }
        
        @keyframes candleSway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2deg); }
        }
        
        .vela::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, #ff9a76, #ff6b9d);
            border-radius: 2px 2px 0 0;
        }
        
        /* 火焰样式 */
        .fuego {
            width: 18px;
            height: 35px;
            background: radial-gradient(circle at 50% 90%, #fff, #fffb96, #ff9b05);
            border-radius: 50% 50% 20% 20%;
            box-shadow: 0 0 25px rgba(255, 155, 5, 0.8), 0 0 15px rgba(255, 155, 5, 0.5);
            animation: flame 1.2s infinite alternate ease-in-out;
            position: relative;
            margin: -10px auto 0;
            filter: blur(0.5px);
            transition: all 0.5s ease;
        }
        
        /* 火焰熄灭状态 */
        .fuego.blown {
            opacity: 0;
            transform: scale(0);
        }
        
        @keyframes flame {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.1) translateY(-6px); }
        }
        
        /* 蛋糕装饰光点 */
        .cake-decoration {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .cake-sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff, 0 0 25px #ff6b9d;
            animation: sparkle 2s infinite alternate;
        }
        
        @keyframes sparkle {
            from { opacity: 0.7; transform: scale(1); }
            to { opacity: 1; transform: scale(1.3); }
        }
        
        /* 许愿文字提示 */
        .wish-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff6b9d;
            font-size: 24px;
            text-shadow: 0 2px 10px rgba(255, 107, 157, 0.3);
            opacity: 0;
            transition: all 1s ease;
            z-index: 10;
            pointer-events: none;
            animation: wishFloat 3s ease-in-out infinite alternate;
        }
        
        @keyframes wishFloat {
            from { transform: translate(-50%, -50%) translateY(0); }
            to { transform: translate(-50%, -50%) translateY(-15px); }
        }
        
        .wish-text.show {
            opacity: 1;
        }
        
        /* 蛋糕页功能按钮组 */
        .cake-btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
            margin-bottom: 40px;
        }
        
        /* 蛋糕页按钮样式 */
        .cake-func-btn {
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(90deg, #ff6b9d, #ff9a76);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.3);
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        
        .cake-func-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.8s ease;
        }
        
        .cake-func-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(255, 107, 157, 0.4);
            background: linear-gradient(90deg, #ff5588, #ff8a65);
        }
        
        .cake-func-btn:hover::before {
            left: 100%;
        }
        
        .cake-func-btn:active {
            transform: translateY(0);
        }
        
        /* 蛋糕页主按钮 */
        #cakePage .main-btn {
            padding: 20px 60px;
            font-size: 22px;
            background: linear-gradient(90deg, #ff6b9d, #ff9a76);
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 12px 35px rgba(255, 107, 157, 0.4);
            font-weight: 600;
            position: relative;
            overflow: hidden;
            margin-top: 20px;
            letter-spacing: 1px;
        }
        
        #cakePage .main-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.8s ease;
        }
        
        #cakePage .main-btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 18px 45px rgba(255, 107, 157, 0.5);
            background: linear-gradient(90deg, #ff5588, #ff8a65);
        }
        
        #cakePage .main-btn:hover::before {
            left: 100%;
        }
        
        #cakePage .main-btn:active {
            transform: translateY(-3px);
        }

        /* 主页面 */
        #mainPage {
            display: none;
            padding: 30px 20px;
            animation: pageFadeIn 1.2s ease-out;
            position: relative;
            z-index: 10;
        }
        #mainPage h1 {
            color: #ff6b9d;
            font-size: 30px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(255, 107, 157, 0.2);
        }
        
        /* 照片轮播 */
        .carousel-box {
            position: relative;
            width: 100%;
            max-width: 750px;
            height: 70vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            overflow: hidden;
            margin: 0 auto 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            animation: carouselShadow 6s ease infinite alternate;
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @keyframes carouselShadow {
            from { box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
            to { box-shadow: 0 20px 50px rgba(255,107,157,0.2); }
        }
        .carousel-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: auto;
            height: auto;
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            opacity: 0;
            animation: fade 4s ease-in-out forwards;
            transition: all 0.5s ease;
        }
        @keyframes fade {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.98) rotate(0deg); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.02) rotate(1deg); }
        }
        .img1 { animation-delay: 0s; }
        .img2 { animation-delay: 4s; }
        .img3 { animation-delay: 8s; }
        .img4 { animation-delay: 12s; }
        .img5 { animation-delay: 16s; }
        .img6 { animation-delay: 20s; }
        .img7 { animation-delay: 24s; }
        .img8 { animation-delay: 28s; }
        .img9 { animation-delay: 32s; }
        .img10 { animation-delay: 36s; }

        /* 打字机效果 */
        .typewriter-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            padding: 30px;
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            z-index: 10;
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.95);
            transition: all 1s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 15px 40px rgba(255,107,157,0.25);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        .typewriter-container.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .typewriter-text {
            font-size: 20px;
            line-height: 2;
            color: #ff6b9d;
            border-right: 3px solid #ff6b9d;
            animation: blink 0.8s step-end infinite;
            white-space: pre-line;
            padding-right: 8px;
            text-shadow: 0 1px 2px rgba(255, 107, 157, 0.1);
        }
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* 功能按钮组 */
        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 30px 0;
        }
        .func-btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.08);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            font-weight: 600;
            color: #666;
        }
        .func-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: all 0.8s ease;
        }
        .func-btn:hover {
            background: linear-gradient(90deg, #ff6b9d, #ff9a76);
            color: #fff;
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(255,107,157,0.4);
        }
        .func-btn:hover::before {
            left: 100%;
        }
        .func-btn:active {
            transform: translateY(-2px);
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(8px);
        }
        .modal.show {
            display: flex;
            animation: modalFadeIn 0.6s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            padding: 35px;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            transform: scale(0.9);
            animation: modalPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.9);
        }
        @keyframes modalPop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-title {
            font-size: 24px;
            color: #ff6b9d;
            margin-bottom: 20px;
            text-shadow: 0 1px 3px rgba(255,107,157,0.2);
        }
        .modal-text {
            font-size: 17px;
            line-height: 1.8;
            color: #555;
            margin-bottom: 25px;
        }
        .modal-close {
            padding: 10px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #ff6b9d, #ff9a76);
            color: #fff;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 6px 15px rgba(255,107,157,0.2);
            font-size: 16px;
            font-weight: 600;
        }
        .modal-close:hover {
            background: linear-gradient(90deg, #ff5588, #ff8a65);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,107,157,0.3);
        }

        .footer-signature {
            color: #999;
            margin-top: 30px;
            font-size: 16px;
            animation: signatureFade 4s ease infinite alternate;
            text-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        @keyframes signatureFade {
            from { color: #999; }
            to { color: #ff6b9d; }
        }

        /* 响应式优化 */
        @media (max-width: 768px) {
            .pwd-card {
                padding: 40px 25px;
            }
            .pwd-card h1 {
                font-size: 28px;
            }
            #cake {
                width: 280px;
            }
            .typewriter-text {
                font-size: 18px;
                line-height: 1.8;
            }
            .carousel-img {
                max-width: 95%;
                max-height: 95%;
            }
            .velas {
                gap: 15px;
            }
            .vela {
                width: 10px;
                height: 30px;
            }
            .fuego {
                width: 16px;
                height: 30px;
            }
            .cake-func-btn {
                padding: 12px 30px;
                font-size: 16px;
            }
            #cakePage h1 {
                font-size: 32px;
            }
            .wish-text {
                font-size: 20px;
            }
        }
/* 生日飘字 */
.birthday-text {
    position: fixed;
    font-size: 24px;
    font-weight: bold;
    color: #ff6b9d;
    text-shadow: 0 0 10px #ff6b9d, 0 0 20px #ff9a76;
    pointer-events: none;
    z-index: 9998;
    opacity: 0;
    animation: birthdayFloat 8s ease-in-out forwards;
}
@keyframes birthdayFloat {

        // 粒子背景特效
function createParticles() {
    clearInterval(particlesInterval);
    const particlesContainer = document.getElementById('particles');
    particlesInterval = setInterval(() => {
        const particle = document.createElement('div');
        const size = Math.random() * 8 + 2;
        const color1 = 255;
        const color2 = 107 + Math.random() * 50;
        const color3 = 157 + Math.random() * 50;
        
        particle.style.position = 'absolute';
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        // 新增渐变背景
        particle.style.background = `radial-gradient(circle, rgb(${color1}, ${color2}, ${color3}), rgb(${color1}, ${color2-20}, ${color3-20}))`;
        particle.style.borderRadius = '50%';
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.opacity = Math.random() * 0.7 + 0.3;
        // 新增轨迹动画
        particle.style.transition = `all ${Math.random() * 15 + 5}s cubic-bezier(0.2, 0.8, 0.2, 1)`;
        // 新增光晕
        particle.style.boxShadow = `0 0 ${size*2}px rgba(${color1}, ${color2}, ${color3}, 0.4)`;
        
        particlesContainer.appendChild(particle);
        
        setTimeout(() => {
            // 随机轨迹，而非简单位移
            particle.style.left = `${Math.random() * 100}%`;
            particle.style.top = `${Math.random() * 100}%`;
            particle.style.opacity = '0';
            particle.style.transform = `scale(${Math.random() * 2 + 0.5}) rotate(${Math.random() * 360}deg)`;
            
            setTimeout(() => {
                particle.remove();
            }, 1500);
        }, 100);
    }, 200); // 提高粒子生成频率
}
        // 彩带特效
        function createConfetti() {
            document.getElementById('confetti').style.display = 'block';
            clearInterval(confettiInterval);
            
            confettiInterval = setInterval(() => {
                const confetti = document.createElement('div');
                const colors = ['#ff6b9d', '#ffc107', '#4CAF50', '#2196F3', '#9C27B0', '#ff8a65'];
                const size = Math.random() * 12 + 6;
                
                confetti.style.position = 'absolute';
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size * (Math.random() > 0.5 ? 1 : 3)}px`;
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.top = '-20px';

                document.getElementById('hearts').appendChild(heart);

            }, 250);
        }

        // 烟花特效
        function createFireworks() {
            document.getElementById('fireworks').style.display = 'block';
            clearInterval(fireworksInterval);
            
            function launchFirework() {
                const firework = document.createElement('div');
                const xPos = Math.random() * 80 + 10;
                const colors = ['#ff6b9d', '#ffc107', '#4CAF50', '#2196F3', '#9C27B0', '#ff8a65', '#ffffff'];
                
                firework.style.position = 'absolute';
                firework.style.width = '6px';
                firework.style.height = '25px';
                firework.style.background = 'white';
                firework.style.borderRadius = '3px';
                firework.style.left = `${xPos}%`;
                firework.style.bottom = '0';
                firework.style.opacity = '1';
                firework.style.transition = `all ${Math.random() * 2 + 1}s ease-in-out`;
                
                document.getElementById('fireworks').appendChild(firework);
                
                setTimeout(() => {
                    firework.style.bottom = `${Math.random() * 40 + 30}%`;
                    firework.style.opacity = '0';
                    
                    setTimeout(() => {
                        firework.remove();
                        
                        for (let i = 0; i < 100; i++) {
                            const particle = document.createElement('div');
                            const angle = (i / 100) * Math.PI * 2;
                            const distance = Math.random() * 80 + 50;
                            const color = colors[Math.floor(Math.random() * colors.length)];

                            particle.style.boxShadow = `0 0 15px ${color}`;

                    }, 100);

        // 跳转到主页面
        function goToMain() {

        // 打字机效果
        function typeWrite(str, i = 0) {
            clearTimeout(typeTimer);
            typeText.textContent = '';
            const cleanStr = str.trim();
            
            function run() {
                if (i < cleanStr.length) {
                    const char = cleanStr.charAt(i);
                    typeText.textContent += char;
                    i++;
                    const delay = (char === '\n' || char === '  ') ? 300 : 
                                  (char === '，' || char === '。' || char === '！') ? 150 : 80;
                    typeTimer = setTimeout(run, delay);
                }
            }
            run();
        }

        // 重新播放轮播
        function restartCarousel() {
            typeContainer.classList.remove('show');
            clearTimeout(typeTimer);
            typeText.textContent = '';
            
            const carouselImages = document.querySelectorAll('.carousel-img');
            carouselImages.forEach(img => {
                img.style.animation = 'none';
                setTimeout(() => {
                    img.style.animation = '';
                }, 10);
            });
            
            setTimeout(() => {
                const delays = [0, 4, 8, 12, 16, 20, 24, 28, 32, 36];
                carouselImages.forEach((img, index) => {
                    img.style.animationDelay = `${delays[index]}s`;
                });
                
                setTimeout(() => {
                    typeContainer.classList.add('show');
                    typeWrite(birthdayWords);
                }, 40000);
            }, 100);
            
            alert('图片轮播已重新开始！');
        }

        // 弹窗功能
        function openModal(which) {
            document.getElementById(which + 'Modal').classList.add('show');
        }

        function closeModal() {
            document.querySelectorAll('.modal').forEach(m => {
                m.classList.remove('show');
                const content = m.querySelector('.modal-content');
                content.style.animation = 'none';
                setTimeout(() => {
                    content.style.animation = '';
                }, 10);
            });
        }
