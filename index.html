<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎂 范鑫雨 · 二十而丽 🎂</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", "Helvetica Neue", system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff0f8 0%, #ffe2f0 50%, #fff5fd 100%);
            overflow-x: hidden;
            position: relative;
        }
        
        /* 简化背景动画，提高性能 */
        body::after {
            content: '';
            position: fixed;
            inset: -50%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 200, 230, 0.15) 0%, transparent 50%);
            animation: spinGlow 30s linear infinite;
            pointer-events: none;
            z-index: -2;
        }
        
        @keyframes spinGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 优化粒子性能 */
        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
        }

        .fx-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            display: none;
            will-change: transform;
        }

        /* ===== 密码页 ===== */
        #pwdPage {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            animation: entryZoom 0.8s ease;
        }
        
        @keyframes entryZoom {
            0% { opacity: 0; transform: scale(0.96); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        .pwd-card {
            background: rgba(255, 248, 250, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 30px;
            box-shadow: 0 30px 60px rgba(255, 100, 150, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.8);
            max-width: 400px;
            width: 100%;
        }
        
        .pwd-card h1 {
            color: #ff6b9d;
            font-size: clamp(28px, 7vw, 34px);
            font-weight: 700;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .pwd-card h1::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, #ff85b3, #ffbc7a);
            border-radius: 3px;
            margin: 12px auto 8px;
        }
        
        .pwd-subtitle {
            color: #b36b87;
            font-size: 15px;
            margin-bottom: 25px;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            color: #b35f80;
            font-size: 14px;
            margin-bottom: 5px;
            padding-left: 15px;
        }
        
        .form-input {
            width: 100%;
            height: 50px;
            font-size: 18px;
            padding: 0 20px;
            border: 2px solid #ffbfd5;
            border-radius: 30px;
            outline: none;
            background: white;
            transition: 0.2s;
            -webkit-appearance: none;
        }
        
        .form-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 5px rgba(255, 107, 157, 0.1);
        }
        
        #pwdPage button {
            width: 100%;
            height: 52px;
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff7aa8, #ffaa77);
            border: none;
            border-radius: 30px;
            color: white;
            margin-top: 16px;
            box-shadow: 0 15px 25px rgba(255, 110, 140, 0.3);
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        #pwdPage button:active {
            transform: scale(0.98);
        }
        
        .error {
            color: #e03a5e;
            background: rgba(255, 220, 230, 0.9);
            border-radius: 30px;
            padding: 10px;
            margin-top: 15px;
            font-size: 14px;
            display: none;
            text-align: center;
        }

        /* ===== 蛋糕页（优化性能）===== */
        #cakePage {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px 15px 20px;
            position: relative;
            z-index: 10;
            background: radial-gradient(circle at 20% 30%, #ffeef7, #fffaff 90%);
            animation: bloomIn 0.8s ease;
        }
        
        @keyframes bloomIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        
        #cakePage h1 {
            font-size: clamp(28px, 7vw, 36px);
            margin: 0 0 5px 0;
            text-align: center;
            background: linear-gradient(145deg, #ff6b9d, #ff9f7a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
            width: 100%;
        }
        
        #cakePage h1::before,
        #cakePage h1::after {
            content: '🎀';
            font-size: 24px;
            margin: 0 5px;
            display: inline-block;
            -webkit-text-fill-color: initial;
            color: #ff8da1;
        }
        
        .cake-subtitle {
            color: #b35f80;
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        /* 蛋糕容器优化 */
        .cake-container {
            position: relative;
            margin: 0 0 15px;
            transform: scale(1);
            filter: drop-shadow(0 20px 25px rgba(255, 100, 150, 0.3));
            transition: 0.3s;
            max-width: 320px;
            width: 100%;
        }
        
        #cake {
            width: 100%;
            height: auto;
            display: block;
            animation: float 3s infinite alternate ease-in-out;
            will-change: transform;
        }
        
        @keyframes float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }
        
        /* 蜡烛 - 优化位置和性能 */
        .velas {
            display: flex;
            gap: 15px;
            justify-content: center;
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            width: 100%;
            pointer-events: none;
        }
        
        .vela {
            width: 12px;
            height: 45px;
            background: linear-gradient(145deg, #f8f8f8, #e0e0e0);
            border-radius: 4px 4px 0 0;
            box-shadow: inset 0 -5px 5px #b8b8b8, 0 5px 10px rgba(0,0,0,0.1);
            position: relative;
            animation: sway 2.5s infinite alternate ease-in-out;
            transform-origin: bottom center;
            pointer-events: auto;
            cursor: pointer;
            transition: transform 0.2s;
            will-change: transform;
        }
        
        .vela:active {
            transform: scale(1.1);
        }
        
        @keyframes sway {
            0% { transform: rotate(-1deg); }
            100% { transform: rotate(1.5deg); }
        }
        
        .vela::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 2px;
            right: 2px;
            height: 6px;
            background: linear-gradient(90deg, #ffaa7a, #ff6b9d);
            border-radius: 3px 3px 0 0;
        }
        
        /* 火焰 - 优化动画性能 */
        .fuego {
            width: 22px;
            height: 40px;
            background: radial-gradient(circle at 50% 80%, #fffef0, #ffb84d, #ff6b4a);
            border-radius: 50% 50% 30% 30%;
            position: relative;
            top: -32px;
            left: -5px;
            filter: blur(1px);
            box-shadow: 0 0 25px #ffb347;
            animation: flame 0.6s infinite alternate ease-in-out;
            will-change: transform, opacity;
        }
        
        @keyframes flame {
            0% { transform: scale(1) translateY(0); opacity: 0.9; }
            100% { transform: scale(1.15) translateY(-8px); opacity: 1; }
        }
        
        .fuego.blown {
            opacity: 0;
            transform: scale(0);
            animation: none;
        }
        
        /* 烟雾特效优化 */
        .smoke-effect {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            filter: blur(6px);
            animation: smokeRise 1.2s ease-out forwards;
            pointer-events: none;
            z-index: 20;
            will-change: transform, opacity;
        }
        
        @keyframes smokeRise {
            0% { opacity: 0.6; transform: translateY(0) scale(0.5); }
            100% { opacity: 0; transform: translateY(-40px) scale(2); }
        }
        
        .cake-decoration {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .cake-sparkle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px #ffa8c5;
            animation: sparkle 1.5s infinite alternate;
            will-change: opacity, transform;
        }
        
        @keyframes sparkle {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }
        
        .wish-text {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 20px;
            color: #d44e78;
            box-shadow: 0 10px 20px rgba(255, 130, 170, 0.25);
            border: 2px solid #ffd9e5;
            opacity: 0;
            transition: 0.3s;
            white-space: nowrap;
            z-index: 20;
            pointer-events: none;
        }
        
        .wish-text.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.05);
        }
        
        /* 按钮优化 */
        .cake-btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 10px 0 5px;
            width: 100%;
            max-width: 400px;
        }
        
        .cake-func-btn {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #ffbfd5;
            border-radius: 30px;
            color: #b34e71;
            box-shadow: 0 8px 15px #ffc0d0;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            flex: 0 1 auto;
            -webkit-tap-highlight-color: transparent;
        }
        
        .cake-func-btn:active {
            transform: scale(0.96);
            background: #ffe2ed;
        }
        
        .main-btn {
            padding: 14px 45px;
            font-size: 20px;
            background: linear-gradient(135deg, #ff77a8, #ffaa77);
            border: none;
            border-radius: 40px;
            color: white;
            font-weight: 700;
            box-shadow: 0 15px 25px #ff90b0;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
            -webkit-tap-highlight-color: transparent;
        }
        
        .main-btn:active {
            transform: scale(0.97);
        }

        /* ===== 主页面（优化图片显示）===== */
        #mainPage {
            display: none;
            padding: 20px 15px 30px;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #mainPage h1 {
            color: #c45a7a;
            font-size: clamp(24px, 6vw, 30px);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.4;
            padding: 0 10px;
        }
        
        /* 轮播框优化 - 确保图片在框内 */
        .carousel-box {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 3/4;
            margin: 0 auto 20px;
            border-radius: 30px;
            background: white;
            box-shadow: 0 20px 30px #ffbfcf;
            border: 3px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, #ff99bb, #ffc090) border-box;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .carousel-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 27px;
            opacity: 0;
            animation: crossFade 40s linear infinite;
            will-change: opacity;
        }
        
        @keyframes crossFade {
            0% { opacity: 0; }
            4% { opacity: 1; }
            10% { opacity: 1; }
            14% { opacity: 0; }
            100% { opacity: 0; }
        }
        
        /* 图片延迟设置 */
        .img1 { animation-delay: 0s; }
        .img2 { animation-delay: 4s; }
        .img3 { animation-delay: 8s; }
        .img4 { animation-delay: 12s; }
        .img5 { animation-delay: 16s; }
        .img6 { animation-delay: 20s; }
        .img7 { animation-delay: 24s; }
        .img8 { animation-delay: 28s; }
        .img9 { animation-delay: 32s; }
        .img10 { animation-delay: 36s; }

        /* 打字机容器 - 图片播放完后显示 */
        .typewriter-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 350px;
            background: rgba(255, 245, 250, 0.97);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px;
            border-radius: 40px;
            box-shadow: 0 20px 35px rgba(255, 100, 150, 0.25);
            border: 2px solid white;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 30;
            pointer-events: none;
            max-height: 70vh;
            overflow-y: auto;
        }
        
        .typewriter-container.show {
            opacity: 1;
        }
        
        .typewriter-text {
            font-size: 16px;
            line-height: 1.7;
            color: #b33b66;
            text-align: center;
            white-space: pre-wrap;
            word-wrap: break-word;
            border-right: 2px solid #ff88b0;
            animation: blink 1s step-end infinite;
            padding: 5px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        @keyframes blink {
            50% { border-color: transparent; }
        }

        /* 按钮组优化 */
        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }
        
        .func-btn {
            padding: 12px 25px;
            font-size: 16px;
            background: white;
            border: 2px solid #ffbfd0;
            border-radius: 30px;
            color: #b34b70;
            font-weight: 600;
            box-shadow: 0 10px 20px #ffc0d0;
            cursor: pointer;
            transition: 0.2s;
            -webkit-tap-highlight-color: transparent;
            flex: 0 1 auto;
        }
        
        .func-btn:active {
            transform: scale(0.96);
            background: #ffecf2;
        }
        
        .footer-signature {
            font-size: 16px;
            color: #bc5277;
            margin-top: 25px;
            text-align: center;
            padding: 0 15px;
        }

        /* 弹窗优化 */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }
        
        .modal.show {
            display: flex;
            animation: modalFade 0.3s;
        }
        
        @keyframes modalFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: white;
            max-width: 380px;
            width: 100%;
            padding: 30px 25px;
            border-radius: 40px;
            box-shadow: 0 30px 50px #d98fa8;
            text-align: center;
            transform: scale(0.9);
            animation: modalPop 0.3s forwards;
        }
        
        @keyframes modalPop {
            to { transform: scale(1); }
        }
        
        .modal-title {
            font-size: 26px;
            color: #d43b70;
            margin-bottom: 15px;
        }
        
        .modal-text {
            color: #784b5e;
            line-height: 1.7;
            font-size: 16px;
            margin-bottom: 20px;
            white-space: pre-line;
        }
        
        .modal-close {
            background: linear-gradient(135deg, #ff7caa, #ffac7c);
            border: none;
            padding: 12px 35px;
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 12px 20px #ffa0b5;
            -webkit-tap-highlight-color: transparent;
        }
        
        .modal-close:active {
            transform: scale(0.96);
        }

        /* 生日飘字优化 */
        .birthday-float {
            position: fixed;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff77aa, #ffb07a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            z-index: 9997;
            pointer-events: none;
            animation: rise 7s linear forwards;
            filter: drop-shadow(0 0 10px #ffa5c0);
            will-change: transform, opacity;
        }
        
        @keyframes rise {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-20vh) rotate(5deg); opacity: 0; }
        }

        /* 爱心特效优化 - 使用transform3d提升性能 */
        .heart-particle {
            position: absolute;
            font-size: 20px;
            color: #ff98b9;
            filter: drop-shadow(0 0 8px #ffa8c5);
            animation: heartFloat 6s linear forwards;
            will-change: transform, opacity;
            transform: translateZ(0);
            backface-visibility: hidden;
        }
        
        @keyframes heartFloat {
            0% { 
                transform: translateY(0) translateX(0) rotate(0deg); 
                opacity: 0.9; 
            }
            100% { 
                transform: translateY(-100vh) translateX(20px) rotate(360deg); 
                opacity: 0; 
            }
        }

        /* 响应式优化 */
        @media (max-width: 380px) {
            .cake-func-btn { padding: 8px 16px; font-size: 14px; }
            .func-btn { padding: 10px 20px; font-size: 14px; }
            .typewriter-text { font-size: 14px; }
        }
    </style>
</head>
<body>
    <div id="particles"></div>
    <div class="fx-layer" id="confetti"></div>
    <div class="fx-layer" id="hearts"></div>
    <div class="fx-layer" id="fireworks"></div>
    <div class="fx-layer" id="sparkles"></div>

    <audio id="bgmCake" loop src="music1.mp3" preload="auto"></audio>
    <audio id="bgmMain" loop src="music2.mp3" preload="auto"></audio>
    <audio id="blowSound" src="blow.mp3" preload="auto"></audio>
    <audio id="wishSound" src="wish.mp3" preload="auto"></audio>

    <!-- 密码页 -->
    <div id="pwdPage">
        <div class="pwd-card">
            <h1>🎂 二十而丽 · 鑫雨</h1>
            <p class="pwd-subtitle">输入专属密码开启惊喜 ✨</p>
            
            <div class="input-group">
                <label>账号</label>
                <input type="text" id="userInput" class="form-input" placeholder="fanxinyu">
            </div>
            
            <div class="input-group">
                <label>密码</label>
                <input type="password" id="pwdInput" class="form-input" placeholder="20060329">
            </div>
            
            <button onclick="checkPwd()">💫 开启惊喜</button>
            <div class="error" id="errorTip">密码不对哦，再试试～</div>
        </div>
    </div>

    <!-- 蛋糕页 -->
    <div id="cakePage">
        <h1>🎂 祝范鑫雨生日快乐</h1>
        <p class="cake-subtitle">愿你岁岁常欢愉，年年皆胜意</p>
        
        <div class="cake-container">
            <svg id="cake" viewBox="0 0 200 400">
                <path fill="#b28b7d" d="M170,390 C120,400 80,400 30,390 C26,388 26,372 30,370 C80,380 120,380 170,370 C174,372 174,388 170,390Z"/>
                <path fill="#ffb7c5" d="M160,320 C110,330 90,330 40,320 C36,318 36,302 40,300 C90,310 110,310 160,300 C164,302 164,318 160,320Z"/>
                <path fill="#ffc2d0" d="M150,250 C100,260 100,260 50,250 C46,248 46,232 50,230 C100,240 100,240 150,230 C154,232 154,248 150,250Z"/>
                <path fill="#ffcdda" d="M140,180 C90,190 110,190 60,180 C56,178 56,162 60,160 C110,170 90,170 140,160 C144,162 144,178 140,180Z"/>
                <path fill="#fff2e0" d="M130,120 C80,130 120,130 70,120 C66,118 66,102 70,100 C120,110 80,110 130,100 C134,102 134,118 130,120Z"/>
                <circle cx="100" cy="95" r="12" fill="#ffdb7c"/>
                <circle cx="76" cy="110" r="9" fill="#ff8da1"/>
                <circle cx="124" cy="110" r="9" fill="#ffaa7a"/>
                <circle cx="60" cy="140" r="5" fill="#ffb08a"/>
                <circle cx="140" cy="140" r="5" fill="#ffb08a"/>
            </svg>
            
            <div class="velas" id="velas">
                <div class="vela"><div class="fuego" id="fuego1"></div></div>
                <div class="vela"><div class="fuego" id="fuego2"></div></div>
                <div class="vela"><div class="fuego" id="fuego3"></div></div>
                <div class="vela"><div class="fuego" id="fuego4"></div></div>
                <div class="vela"><div class="fuego" id="fuego5"></div></div>
            </div>
            
            <div class="cake-decoration">
                <div class="cake-sparkle" style="top:20%; left:10%;"></div>
                <div class="cake-sparkle" style="top:40%; left:85%;"></div>
                <div class="cake-sparkle" style="top:60%; left:20%;"></div>
                <div class="cake-sparkle" style="top:30%; left:75%;"></div>
            </div>
            
            <div class="wish-text" id="wishText">🎋 许个愿吧～</div>
        </div>
        
        <div class="cake-btn-group">
            <button class="cake-func-btn" onclick="blowCandle()">🎈 吹蜡烛</button>
            <button class="cake-func-btn" onclick="makeWish()">✨ 许愿</button>
            <button class="cake-func-btn" onclick="changeCakeStyle()">🍰 换蛋糕</button>
            <button class="cake-func-btn" onclick="createFireworks()">🎆 烟花</button>
        </div>
        
        <button class="main-btn" onclick="goToMain()">🎁 开启惊喜</button>
    </div>

    <!-- 主页面 -->
    <div id="mainPage">
        <h1>✨ 范鑫雨 · 二十岁生日快乐 ✨</h1>
        
        <div class="carousel-box">
            <img class="carousel-img img1" src="1.jpg" alt="" loading="lazy">
            <img class="carousel-img img2" src="2.jpg" alt="" loading="lazy">
            <img class="carousel-img img3" src="3.jpg" alt="" loading="lazy">
            <img class="carousel-img img4" src="4.jpg" alt="" loading="lazy">
            <img class="carousel-img img5" src="5.jpg" alt="" loading="lazy">
            <img class="carousel-img img6" src="6.jpg" alt="" loading="lazy">
            <img class="carousel-img img7" src="7.jpg" alt="" loading="lazy">
            <img class="carousel-img img8" src="8.jpg" alt="" loading="lazy">
            <img class="carousel-img img9" src="9.jpg" alt="" loading="lazy">
            <img class="carousel-img img10" src="10.jpg" alt="" loading="lazy">
            
            <div class="typewriter-container" id="typeContainer">
                <div class="typewriter-text" id="typeText"></div>
            </div>
        </div>

        <div class="btn-group">
            <button class="func-btn" onclick="openModal('birthday')">💌 生日祝福</button>
            <button class="func-btn" onclick="openModal('wish')">🌟 未来期许</button>
            <button class="func-btn" onclick="restartCarousel()">🔄 重温照片</button>
            <button class="func-btn" onclick="createFireworks()">🎇 烟花</button>
        </div>

        <div class="footer-signature">💖 愿你永远做那个自由又耀眼的大魚 💖</div>
    </div>

    <!-- 弹窗 -->
    <div class="modal" id="birthdayModal">
        <div class="modal-content">
            <h3 class="modal-title">🎂 范鑫雨生日快乐</h3>
            <div class="modal-text">
                范鑫雨，祝你生日快乐！<br><br>       
我祝愿你的四季慢缓且柔和，也祝愿你的行路稳妥又激荡，祝你从一而终的自由轻盈，在热爱中寻找尽兴，最重要的是，平安顺遂，健康无虞。
            </div>
            <button class="modal-close" onclick="closeModal()">收下祝福</button>
        </div>
    </div>

    <div class="modal" id="wishModal">
        <div class="modal-content">
            <h3 class="modal-title">✨ 未来期许</h3>
            <div class="modal-text">
                愿你奔赴热爱，前程似锦<br>
                愿你永远勇敢，永远被温柔以待<br>
                愿你每一岁都奔走在自己的热爱里<br>
                愿你永远做那个自由又耀眼的大魚
            </div>
            <button class="modal-close" onclick="closeModal()">收到期许</button>
        </div>
    </div>

    <script>
        const bgmCake = document.getElementById('bgmCake');
        const bgmMain = document.getElementById('bgmMain');
        const blowSound = document.getElementById('blowSound');
        const wishSound = document.getElementById('wishSound');
        const typeText = document.getElementById('typeText');
        const typeContainer = document.getElementById('typeContainer');
        const wishText = document.getElementById('wishText');
        const velas = document.getElementById('velas');
        const cake = document.getElementById('cake');
        
        let typeTimer, confettiInterval, heartsInterval, fireworksInterval, sparklesInterval;
        let cakeStyle = 1;
        let isMainPageLoaded = false;
        
        const birthdayWords = `
大魚，祝你20岁生日快乐！真的特别开心能成为你的朋友，也很荣幸可以陪你一起度过这个重要的生日。
你身上有太多闪光点，聪明、帅气、优秀，这些大家都看在眼里。但我最欣赏、最心疼的，还是你的坚强与善良——很多不开心你都习惯自己扛、自己消化，总怕麻烦别人。
可我想认真跟你说：作为你的好兄弟。以后不管有什么心事、委屈、烦恼，都别再一个人硬撑了，随时都可以来找我，永远别怕麻烦我。
也真的很想跟你说一句：谢谢你，兄弟，一直包容我的脾气和小情绪，一路陪着我、理解我。有你这样的朋友，是我特别幸运的事。
兄弟，希望我们长久，可以陪你过到100岁生日
PS：这10张照片是你从小到大的哈哈哈哈哈，还有这是我第一次做网站可能不太完美，希望你能喜欢——Prime
        `;

        // 优化版爱心特效 - 使用requestAnimationFrame
        function createHearts() {
            const layer = document.getElementById('hearts');
            layer.style.display = 'block';
            layer.innerHTML = '';
            
            let heartCount = 0;
            const maxHearts = 30; // 限制数量
            
            function addHeart() {
                if (heartCount >= maxHearts) return;
                
                const heart = document.createElement('div');
                heart.className = 'heart-particle';
                heart.innerText = Math.random() > 0.5 ? '💖' : '❤️';
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.fontSize = (Math.random() * 15 + 15) + 'px';
                
                layer.appendChild(heart);
                heartCount++;
                
                setTimeout(() => {
                    heart.remove();
                    heartCount--;
                }, 6000);
            }
            
            heartsInterval = setInterval(addHeart, 400);
        }

        // 优化版彩带
        function createConfetti() {
            const layer = document.getElementById('confetti');
            layer.style.display = 'block';
            layer.innerHTML = '';
            
            const colors = ['#ff8daf', '#ffbc7a', '#ffe07a'];
            let count = 0;
            
            const interval = setInterval(() => {
                if (count++ > 40) {
                    clearInterval(interval);
                    setTimeout(() => {
                        layer.style.display = 'none';
                        layer.innerHTML = '';
                    }, 2000);
                    return;
                }
                
                const confetti = document.createElement('div');
                const size = Math.random() * 10 + 5;
                confetti.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size * (Math.random() > 0.5 ? 2 : 1)}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    left: ${Math.random() * 100}%;
                    top: -20px;
                    opacity: ${Math.random() * 0.8 + 0.2};
                    border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                    transform: rotate(${Math.random() * 360}deg);
                    transition: top ${Math.random() * 3 + 3}s linear;
                    pointer-events: none;
                    will-change: top;
                `;
                layer.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.style.top = '110%';
                }, 20);
                
                setTimeout(() => confetti.remove(), 5000);
            }, 100);
            
            confettiInterval = interval;
        }

        // 优化版烟花
        window.createFireworks = function() {
            const layer = document.getElementById('fireworks');
            layer.style.display = 'block';
            layer.innerHTML = '';
            
            const colors = ['#ff7ca8', '#ffb077', '#ffdb77'];
            
            for (let i = 0; i < 4; i++) {
                setTimeout(() => {
                    const x = Math.random() * 60 + 20;
                    const y = Math.random() * 30 + 35;
                    
                    for (let s = 0; s < 16; s++) {
                        const angle = (s / 16) * Math.PI * 2;
                        const dist = Math.random() * 50 + 20;
                        
                        const particle = document.createElement('div');
                        particle.style.cssText = `
                            position: absolute;
                            width: 6px;
                            height: 6px;
                            background: ${colors[Math.floor(Math.random() * colors.length)]};
                            border-radius: 50%;
                            left: ${x}%;
                            top: ${y}%;
                            box-shadow: 0 0 15px currentColor;
                            transition: all 1s cubic-bezier(0.2,0.8,0.4,1);
                            pointer-events: none;
                            will-change: transform, opacity;
                        `;
                        layer.appendChild(particle);
                        
                        setTimeout(() => {
                            particle.style.transform = `translate(${Math.cos(angle) * dist}px, ${-Math.sin(angle) * dist}px)`;
                            particle.style.opacity = '0';
                        }, 20);
                        
                        setTimeout(() => particle.remove(), 1200);
                    }
                }, i * 200);
            }
            
            setTimeout(() => {
                layer.style.display = 'none';
                layer.innerHTML = '';
            }, 2000);
        };

        function playMusic(audio) {
            audio.volume = 0.3;
            audio.play().catch(() => {});
        }

        window.checkPwd = function() {
            const user = document.getElementById('userInput').value.trim();
            const pwd = document.getElementById('pwdInput').value.trim();
            
            if (user === 'fanxinyu' && pwd === '20060329') {
                document.getElementById('pwdPage').style.display = 'none';
                document.getElementById('cakePage').style.display = 'flex';
                bgmMain.pause();
                playMusic(bgmCake);
                createHearts();
            } else {
                document.getElementById('errorTip').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('errorTip').style.display = 'none';
                }, 2000);
            }
        };

        function createSmoke(x, y) {
            const smoke = document.createElement('div');
            smoke.className = 'smoke-effect';
            smoke.style.left = x + '%';
            smoke.style.top = y + '%';
            document.getElementById('cakePage').appendChild(smoke);
            setTimeout(() => smoke.remove(), 1200);
        }

        window.blowCandle = function() {
            blowSound.currentTime = 0;
            blowSound.play().catch(() => {});
            
            const velas = document.querySelectorAll('.vela');
            velas.forEach((vela, index) => {
                const rect = vela.getBoundingClientRect();
                const x = (rect.left / window.innerWidth) * 100;
                const y = (rect.top / window.innerHeight) * 100;
                setTimeout(() => createSmoke(x, y), index * 80);
            });
            
            document.querySelectorAll('.fuego').forEach(f => f.classList.add('blown'));
            velas.classList.add('blown');
            
            wishText.textContent = '🎋 愿望会实现的！';
            wishText.classList.add('show');
            setTimeout(() => wishText.classList.remove('show'), 3000);
        };

        window.makeWish = function() {
            wishSound.currentTime = 0;
            wishSound.play().catch(() => {});
            
            wishText.textContent = '✨ 愿所有美好如期而至';
            wishText.classList.add('show');
            
            const layer = document.getElementById('sparkles');
            layer.style.display = 'block';
            
            let sparkleCount = 0;
            const interval = setInterval(() => {
                if (sparkleCount++ > 20) {
                    clearInterval(interval);
                    setTimeout(() => {
                        layer.style.display = 'none';
                        layer.innerHTML = '';
                    }, 500);
                    return;
                }
                
                const sparkle = document.createElement('div');
                sparkle.style.cssText = `
                    position: absolute;
                    width: 10px;
                    height: 10px;
                    background: white;
                    border-radius: 50%;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    box-shadow: 0 0 20px #ffb8d0;
                    opacity: 0.9;
                    transition: 1s;
                    pointer-events: none;
                    will-change: transform, opacity;
                `;
                layer.appendChild(sparkle);
                
                setTimeout(() => {
                    sparkle.style.opacity = '0';
                    sparkle.style.transform = 'scale(2.5)';
                }, 20);
                
                setTimeout(() => sparkle.remove(), 1000);
            }, 80);
            
            setTimeout(() => {
                wishText.classList.remove('show');
            }, 2000);
        };

        window.changeCakeStyle = function() {
            if (cakeStyle === 1) {
                cake.innerHTML = `
                    <path fill="#9d6b4a" d="M170,390..."/><path fill="#ffe68f" d="M160,320..."/><path fill="#ffedb0" d="M150,250..."/><path fill="#fff5d0" d="M140,180..."/><path fill="#ffffff" d="M130,120..."/><circle cx="100" cy="95" r="12" fill="#ff80ab"/><circle cx="76" cy="110" r="9" fill="#ffaa7a"/><circle cx="124" cy="110" r="9" fill="#ffdb7c"/><circle cx="60" cy="140" r="5" fill="#ffb08a"/><circle cx="140" cy="140" r="5" fill="#ffb08a"/>
                `;
                cakeStyle = 2;
            } else {
                cake.innerHTML = `
                    <path fill="#b28b7d" d="M170,390..."/><path fill="#ffb7c5" d="M160,320..."/><path fill="#ffc2d0" d="M150,250..."/><path fill="#ffcdda" d="M140,180..."/><path fill="#fff2e0" d="M130,120..."/><circle cx="100" cy="95" r="12" fill="#ffdb7c"/><circle cx="76" cy="110" r="9" fill="#ff8da1"/><circle cx="124" cy="110" r="9" fill="#ffaa7a"/><circle cx="60" cy="140" r="5" fill="#ffb08a"/><circle cx="140" cy="140" r="5" fill="#ffb08a"/>
                `;
                cakeStyle = 1;
            }
            
            document.querySelectorAll('.fuego').forEach(f => f.classList.remove('blown'));
            velas.classList.remove('blown');
        };

        window.goToMain = function() {
            document.getElementById('cakePage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            bgmCake.pause();
            playMusic(bgmMain);
            
            // 清除爱心特效
            clearInterval(heartsInterval);
            document.getElementById('hearts').style.display = 'none';
            document.getElementById('hearts').innerHTML = '';
            
            createConfetti();
            
            // 生日飘字 - 优化版
            setInterval(() => {
                const span = document.createElement('div');
                span.className = 'birthday-float';
                span.innerText = ['20岁快乐✨','平安顺遂🎈','万事胜意🎂','永远开心❤️'][Math.floor(Math.random() * 4)];
                span.style.left = Math.random() * 70 + 15 + '%';
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 7000);
            }, 2000);
            
            // 图片播放完后再显示文字
            setTimeout(() => {
                typeContainer.classList.add('show');
                typeWrite(birthdayWords);
            }, 40000);
        };

        function typeWrite(str, i = 0) {
            clearTimeout(typeTimer);
            typeText.textContent = '';
            
            function run() {
                if (i < str.length) {
                    typeText.textContent += str[i];
                    i++;
                    
                    let delay = 50;
                    if (str[i-1] === '\n') delay = 200;
                    else if (str[i-1] === '，' || str[i-1] === '。') delay = 120;
                    
                    typeTimer = setTimeout(run, delay);
                    
                    // 自动滚动到底部
                    setTimeout(() => {
                        typeText.scrollTop = typeText.scrollHeight;
                    }, 10);
                }
            }
            run();
        }

        window.restartCarousel = function() {
            typeContainer.classList.remove('show');
            clearTimeout(typeTimer);
            typeText.textContent = '';
            
            // 重置图片动画
            document.querySelectorAll('.carousel-img').forEach(img => {
                img.style.animation = 'none';
                img.offsetHeight; // 强制重绘
                img.style.animation = 'crossFade 40s linear infinite';
            });
            
            // 重新设置40秒后显示文字
            setTimeout(() => {
                typeContainer.classList.add('show');
                typeWrite(birthdayWords);
            }, 40000);
        };

        window.openModal = function(which) {
            document.getElementById(which + 'Modal').classList.add('show');
        };

        window.closeModal = function() {
            document.querySelectorAll('.modal').forEach(m => {
                m.classList.remove('show');
            });
        };

        // 页面初始化
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('userInput').focus();
            }, 300);
            
            // 优化触摸事件
            document.querySelectorAll('button, .vela').forEach(el => {
                el.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                }, { passive: false });
            });
        };
    </script>
</body>
</html>
