<!DOCTYPE html><!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>范鑫雨牛逼克拉斯</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* 温柔渐变背景，替代单调浅灰 */
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }

    /* 外层装饰框：增加层次感和精致度 */
    .outer-container {
      padding: 15px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 
        0 8px 24px rgba(0,0,0,0.06),
        0 0 0 1px rgba(255,255,255,0.9) inset;
    }

    .box {
      position: relative;
      width: 90%;
      max-width: 800px;
      height: 80vh;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      background: #ffffff;
    }

    /* 角落轻量装饰：不抢眼但增加灵动感 */
    .box::before, .box::after {
      content: '';
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      opacity: 0.15;
      z-index: 1;
    }
    .box::before {
      top: 20px;
      left: 20px;
      background: #ff7e5f;
    }
    .box::after {
      bottom: 20px;
      right: 20px;
      background: #feb47b;
    }

    /* 底部渐变遮罩：让图片边缘更柔和 */
    .mask {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background: linear-gradient(transparent, rgba(255,255,255,0.8));
      z-index: 1;
      pointer-events: none;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      opacity: 0;
      /* 更丝滑的动画曲线 */
      animation: fade 4s ease-in-out forwards;
      background: #fafafa;
      /* 图片轻微圆角，更精致 */
      border-radius: 4px;
    }

    .text {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #2d3748;
      font-size: 30px;
      text-align: center;
      line-height: 2.2;
      opacity: 0;
      animation: showText 3s 20s forwards;
      white-space: pre-line;
      /* 精致的文字背景+阴影 */
      background: rgba(255,255,255,0.9);
      padding: 25px 50px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.9);
      z-index: 2;
    }

    /* 优化动画：更丝滑的淡入淡出+轻微缩放 */
    @keyframes fade {
      0% { opacity: 0; transform: scale(0.98); }
      20% { opacity: 1; transform: scale(1); }
      80% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(0.98); }
    }

    @keyframes showText {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.95); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .img1 { animation-delay: 0s; }
    .img2 { animation-delay: 4s; }
    .img3 { animation-delay: 8s; }
    .img4 { animation-delay: 12s; }
    .img5 { animation-delay: 16s; }
  </style>
</head>

<body>
  <div class="outer-container">
    <div class="box">
      <!-- 保留你原来的图片路径和容错 -->
      <img class="img1" src="1.jpg" onError="this.src='https://picsum.photos/800/600?random=1'">
      <img class="img2" src="2.jpg" onError="this.src='https://picsum.photos/800/600?random=2'">
      <img class="img3" src="3.jpg" onError="this.src='https://picsum.photos/800/600?random=3'">
      <img class="img4" src="4.jpg" onError="this.src='https://picsum.photos/800/600?random=4'">
      <img class="img5" src="5.jpg" onError="this.src='https://picsum.photos/800/600?random=5'">

      <!-- 新增柔和遮罩 -->
      <div class="mask"></div>

      <!-- 保留你修改后的文字内容 -->
      <div class="text">
范鑫雨
这是我为你做的专属网站
兄弟祝你越来越帅，你真的是个很厉害的人
相信自己，加油
——Prime
✨
      </div>
    </div>
  </div>
</body>
</html>
