<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂 范鑫雨 · 二十而丽 🎂</title>
    <style>
        /* ===== 基础重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", "华文楷体", cursive;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fff0f8 0%, #ffe2f0 30%, #fff5fd 100%);
            background-size: 300% 300%;
            animation: galaxyBreath 25s ease infinite;
            overflow-x: hidden;
            position: relative;
        }
        
        @keyframes galaxyBreath {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        body::after {
            content: '';
            position: fixed;
            inset: -100%;
            background: radial-gradient(circle at 30% 40%, rgba(255, 200, 230, 0.2) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(255, 220, 180, 0.15) 0%, transparent 60%);
            animation: spinGlow 40s linear infinite;
            pointer-events: none;
            z-index: -2;
        }
        
        @keyframes spinGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .fx-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            display: none;
        }

        /* ===== 密码页 ===== */
        #pwdPage {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            animation: entryZoom 1s ease;
        }
        
        @keyframes entryZoom {
            0% { opacity: 0; transform: scale(0.95); filter: blur(8px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
        
        .pwd-card {
            background: rgba(255, 248, 250, 0.92);
            backdrop-filter: blur(25px);
            border-radius: 60px;
            padding: 45px 40px;
            box-shadow: 0 40px 80px rgba(255, 100, 150, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.8);
            max-width: 440px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .pwd-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 180, 210, 0.25) 0%, transparent 60%);
            animation: rotateBg 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes rotateBg {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .pwd-card h1 {
            color: #ff6b9d;
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 8px 20px rgba(255, 130, 170, 0.4);
            position: relative;
            z-index: 2;
        }
        
        .pwd-card h1::after {
            content: '';
            display: block;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #ff85b3, #ffbc7a, #ffd966, #ff85b3);
            background-size: 300% auto;
            border-radius: 3px;
            margin: 15px auto 8px;
            animation: shimmer 4s linear infinite;
        }
        
        @keyframes shimmer {
            to { background-position: 300% center; }
        }
        
        .pwd-subtitle {
            color: #b36b87;
            font-size: 16px;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 1.5px;
        }
        
        .input-group {
            text-align: left;
            margin-bottom: 18px;
            position: relative;
            z-index: 101;
        }
        
        .input-group label {
            display: block;
            color: #b35f80;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 6px;
            padding-left: 18px;
        }
        
        .form-input {
            width: 100%;
            height: 55px;
            font-size: 20px;
            padding: 0 25px;
            border: 2px solid #ffbfd5;
            border-radius: 40px;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            transition: 0.3s;
            box-shadow: inset 0 5px 12px #ffdbe8;
            position: relative;
            z-index: 102;
            cursor: text;
        }
        
        .form-input:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 8px rgba(255, 130, 170, 0.15), inset 0 5px 12px #ffc0d0;
            transform: translateY(-2px);
        }
        
        #pwdPage button {
            width: 100%;
            height: 60px;
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(135deg, #ff7aa8, #ffaa77);
            border: none;
            border-radius: 40px;
            color: white;
            margin-top: 20px;
            box-shadow: 0 20px 35px rgba(255, 110, 140, 0.5);
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            letter-spacing: 2px;
            z-index: 102;
        }
        
        #pwdPage button:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 30px 45px #ff9eb5;
        }
        
        .error {
            color: #e03a5e;
            background: rgba(255, 220, 230, 0.9);
            border-radius: 40px;
            padding: 12px;
            margin-top: 18px;
            font-size: 16px;
            display: none;
            border: 1px solid #ffa0b0;
        }

        /* ===== 蛋糕页 ===== */
        #cakePage {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 15px 20px 25px;
            position: relative;
            z-index: 10;
            background: radial-gradient(circle at 20% 30%, #ffeef7, #fffaff 90%);
            animation: bloomIn 1.2s ease;
        }
        
        @keyframes bloomIn {
            0% { opacity: 0; filter: blur(10px) brightness(1.2); }
            100% { opacity: 1; filter: blur(0) brightness(1); }
        }
        
        #cakePage h1 {
            font-size: 38px;
            margin: 0 0 8px 0;
            padding: 0;
            text-align: center;
            background: linear-gradient(145deg, #ff6b9d, #ff9f7a, #ffd966, #ff9f7a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255, 150, 200, 0.5);
            animation: titleGlow 3s infinite alternate;
            position: relative;
            line-height: 1.3;
            width: 100%;
        }
        
        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 12px #ffb8d0); }
            to { filter: drop-shadow(0 0 30px #ff9ec0); }
        }
        
        #cakePage h1::before,
        #cakePage h1::after {
            content: '🎀';
            font-size: 28px;
            margin: 0 10px;
            animation: bowWave 2.5s infinite alternate;
            display: inline-block;
            -webkit-text-fill-color: initial;
            color: #ff8da1;
            filter: drop-shadow(0 3px 8px #ffb0c0);
        }
        
        @keyframes bowWave {
            0% { transform: translateY(0) rotate(-6deg); }
            100% { transform: translateY(-10px) rotate(8deg); }
        }
        
        .cake-subtitle {
            color: #b35f80;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 2px 8px #ffe2ed;
            font-weight: 400;
            text-align: center;
            width: 100%;
        }
        
        .cake-container {
            position: relative;
            margin: 0 0 20px;
            transform: scale(1.1);
            filter: drop-shadow(0 25px 30px rgba(255, 100, 150, 0.35));
            transition: 0.5s;
        }
        
        .cake-container:hover {
            filter: drop-shadow(0 35px 40px #ffa5c0);
            transform: scale(1.12);
        }
        
        #cake {
            width: 340px;
            height: auto;
            display: block;
            animation: majesticFloat 3.2s infinite alternate ease-in-out;
            transition: 0.5s;
            filter: brightness(1.02) contrast(1.02);
        }
        
        @keyframes majesticFloat {
            0% { transform: translateY(0) rotate(-0.5deg); }
            100% { transform: translateY(-16px) rotate(1deg); }
        }
        
        /* ===== 蜡烛区域 - 向下移动并添加特效 ===== */
        .velas {
            display: flex;
            gap: 22px;
            justify-content: center;
            position: absolute;
            top: 8%;  /* 向下移动到蛋糕主体上 */
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            filter: drop-shadow(0 10px 15px rgba(255, 100, 50, 0.3));
        }
        
        .vela {
            width: 14px;
            height: 52px;
            background: linear-gradient(145deg, #f8f8f8, #e0e0e0, #f0f0f0);
            border-radius: 6px 6px 3px 3px;
            box-shadow: inset 0 -8px 8px #b8b8b8, 0 10px 15px rgba(0,0,0,0.15);
            position: relative;
            animation: candleSway 3s infinite alternate;
            transform-origin: bottom center;
            transition: all 0.3s ease;
        }
        
        /* 蜡烛发光特效 */
        .vela::after {
            content: '';
            position: absolute;
            top: -10px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            background: radial-gradient(circle at 50% 0%, rgba(255, 220, 150, 0.4), transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: -1;
        }
        
        .vela:hover::after {
            opacity: 1;
        }
        
        .vela:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }
        
        @keyframes candleSway {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(2.5deg); }
        }
        
        .vela::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 2px;
            right: 2px;
            height: 8px;
            background: linear-gradient(90deg, #ffaa7a, #ff6b9d, #ffd966, #ffaa7a);
            background-size: 300% auto;
            border-radius: 4px 4px 0 0;
            animation: candleShine 3s linear infinite;
            box-shadow: 0 0 15px #ffaa7a;
        }
        
        @keyframes candleShine {
            to { background-position: 300% center; }
        }
        
        /* 火焰 - 增强特效 */
        .fuego {
            width: 26px;
            height: 48px;
            background: radial-gradient(circle at 50% 80%, #fffef0, #ffb84d, #ff6b4a);
            border-radius: 50% 50% 30% 30%;
            position: relative;
            top: -36px;
            left: -6px;
            filter: blur(1.5px);
            box-shadow: 0 0 40px #ffb347, 0 0 70px #ff8c5a, 0 0 100px #ff6b4a;
            animation: flameDance 0.8s infinite alternate ease-in-out;
            transition: all 0.3s ease;
            transform-origin: center bottom;
        }
        
        /* 火焰光晕特效 */
        .fuego::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -15px;
            right: -15px;
            bottom: -15px;
            background: radial-gradient(circle, rgba(255, 200, 100, 0.3), transparent 70%);
            border-radius: 50%;
            animation: flameGlow 1.5s infinite alternate;
            pointer-events: none;
        }
        
        @keyframes flameGlow {
            0% { opacity: 0.3; transform: scale(1); }
            100% { opacity: 0.8; transform: scale(1.2); }
        }
        
        @keyframes flameDance {
            0% { 
                transform: scale(1) translateY(0) rotate(-2deg); 
                opacity: 0.95; 
                filter: blur(1.2px);
            }
            100% { 
                transform: scale(1.3) translateY(-15px) rotate(3deg); 
                opacity: 1; 
                filter: blur(2px);
            }
        }
        
        .fuego.blown {
            opacity: 0;
            transform: scale(0);
            animation: none;
            box-shadow: none;
        }
        
        .fuego.blown::before {
            display: none;
        }
        
        .velas.blown .vela {
            animation: none;
        }
        
        .velas.blown .vela::after {
            opacity: 0;
        }
        
        /* 蜡烛熄灭时的烟雾特效 */
        .smoke-effect {
            position: absolute;
            width: 30px;
            height: 30px;
            background: radial-gradient(circle, rgba(255,255,255,0.8), rgba(200,200,200,0.3), transparent);
            border-radius: 50%;
            filter: blur(8px);
            animation: smokeRise 2s ease-out forwards;
            pointer-events: none;
            z-index: 20;
        }
        
        @keyframes smokeRise {
            0% {
                opacity: 0.8;
                transform: translateY(0) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(2);
            }
        }
        
        .cake-decoration {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }
        
        .cake-sparkle {
            position: absolute;
            width: 16px;
            height: 16px;
            background: #fffdf0;
            border-radius: 50%;
            box-shadow: 0 0 20px #ffd9e5, 0 0 40px #ffa8c5;
            animation: sparkleDance 1.8s infinite alternate;
        }
        
        @keyframes sparkleDance {
            0% { opacity: 0.4; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.4); }
        }
        
        .cake-container::after {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -10px;
            transform: translateX(-50%);
            width: 260px;
            height: 70px;
            background: radial-gradient(circle, rgba(255, 140, 180, 0.5) 0%, transparent 80%);
            border-radius: 50%;
            filter: blur(20px);
            z-index: -1;
            animation: glowPulse 3s infinite alternate;
        }
        
        @keyframes glowPulse {
            from { opacity: 0.5; width: 240px; }
            to { opacity: 1; width: 300px; }
        }
        
        .wish-text {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 22px;
            font-weight: 600;
            color: #d44e78;
            box-shadow: 0 15px 30px rgba(255, 130, 170, 0.35);
            border: 2px solid #ffd9e5;
            opacity: 0;
            transition: 0.5s;
            white-space: nowrap;
            z-index: 20;
            letter-spacing: 1px;
        }
        
        .wish-text.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 20px 40px #ffa5c0;
        }
        
        .cake-btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 15px 0 10px;
            position: relative;
            z-index: 20;
        }
        
        .cake-func-btn {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.92);
            border: 2px solid #ffbfd5;
            border-radius: 40px;
            color: #b34e71;
            box-shadow: 0 12px 25px #ffc0d0;
            cursor: pointer;
            transition: 0.3s;
            backdrop-filter: blur(8px);
            position: relative;
            z-index: 21;
            letter-spacing: 1px;
        }
        
        .cake-func-btn:hover {
            background: #ffe2ed;
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 20px 35px #ff9eb5;
            border-color: #ff8fb0;
            color: #d4316a;
        }
        
        .main-btn {
            padding: 16px 60px;
            font-size: 22px;
            background: linear-gradient(135deg, #ff77a8, #ffaa77);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 700;
            box-shadow: 0 25px 40px #ff90b0;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            letter-spacing: 2px;
            position: relative;
            z-index: 21;
        }
        
        .main-btn:hover {
            transform: scale(1.03) translateY(-8px);
            box-shadow: 0 35px 55px #ff80a8;
        }

        /* ===== 主页面 ===== */
        #mainPage {
            display: none;
            padding: 25px 20px 40px;
            position: relative;
            z-index: 10;
            animation: fadeReveal 1s;
        }
        
        @keyframes fadeReveal {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        #mainPage h1 {
            color: #c45a7a;
            font-size: 32px;
            margin-bottom: 25px;
            text-shadow: 0 5px 15px #ffc0d0;
            text-align: center;
            line-height: 1.4;
        }
        
        .carousel-box {
            position: relative;
            width: 90%;
            max-width: 850px;
            height: 62vh;
            margin: 0 auto 20px;
            border-radius: 40px;
            background: #fffafc;
            box-shadow: 0 25px 40px #ffbfcf;
            border: 3px solid transparent;
            background: linear-gradient(#fff, #fff) padding-box,
                        linear-gradient(135deg, #ff99bb, #ffc090, #ffe085, #ff99bb) border-box;
            background-size: 300% 300%;
            animation: borderGlow 8s ease infinite;
            overflow: hidden;
            transition: 0.4s;
        }
        
        @keyframes borderGlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        .carousel-box:hover {
            transform: translateY(-8px);
            box-shadow: 0 35px 55px #ffa5ba;
        }
        
        .carousel-img {
            position: absolute;
            max-width: 92%;
            max-height: 92%;
            object-fit: contain;
            border-radius: 28px;
            opacity: 0;
            animation: crossFadeCycle 40s linear infinite;
            box-shadow: 0 15px 25px rgba(0,0,0,0.1);
        }
        
        @keyframes crossFadeCycle {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.98); }
            4% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            10% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            14% { opacity: 0; transform: translate(-50%, -50%) scale(1.02); }
            100% { opacity: 0; }
        }
        
        .img1 { animation-delay: 0s; }
        .img2 { animation-delay: 4s; }
        .img3 { animation-delay: 8s; }
        .img4 { animation-delay: 12s; }
        .img5 { animation-delay: 16s; }
        .img6 { animation-delay: 20s; }
        .img7 { animation-delay: 24s; }
        .img8 { animation-delay: 28s; }
        .img9 { animation-delay: 32s; }
        .img10 { animation-delay: 36s; }

        .typewriter-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 650px;
            background: rgba(255, 245, 250, 0.95);
            backdrop-filter: blur(20px);
            padding: 25px 35px;
            border-radius: 50px;
            box-shadow: 0 25px 45px rgba(255, 100, 150, 0.3), 0 0 0 2px rgba(255, 255, 255, 0.8) inset;
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1);
            border: 2px solid rgba(255, 255, 255, 0.9);
            z-index: 30;
            pointer-events: none;
            max-height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .typewriter-container.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .typewriter-text {
            font-size: 18px;
            line-height: 1.7;
            color: #b33b66;
            text-align: center;
            white-space: pre-wrap;
            word-wrap: break-word;
            border-right: 3px solid #ff88b0;
            animation: cursorBlink 1s step-end infinite;
            padding: 5px 10px;
            font-weight: 500;
            text-shadow: 0 2px 6px #ffd0e0;
            width: 100%;
            max-height: 55vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #ff99bb #ffe2ed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }
        
        .typewriter-text::-webkit-scrollbar {
            width: 6px;
        }
        
        .typewriter-text::-webkit-scrollbar-track {
            background: #ffe2ed;
            border-radius: 10px;
        }
        
        .typewriter-text::-webkit-scrollbar-thumb {
            background: #ff99bb;
            border-radius: 10px;
        }
        
        @keyframes cursorBlink {
            50% { border-color: transparent; }
        }

        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 30px 0;
            position: relative;
            z-index: 20;
        }
        
        .func-btn {
            padding: 14px 35px;
            font-size: 18px;
            background: white;
            border: 2px solid #ffbfd0;
            border-radius: 40px;
            color: #b34b70;
            font-weight: 600;
            box-shadow: 0 15px 28px #ffc0d0;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
            z-index: 21;
            letter-spacing: 1px;
        }
        
        .func-btn:hover {
            background: #ffecf2;
            transform: translateY(-6px) scale(1.03);
            box-shadow: 0 25px 38px #ffa0b8;
            border-color: #ff8fb2;
        }
        
        .footer-signature {
            font-size: 18px;
            color: #bc5277;
            margin-top: 30px;
            animation: gentleGlow 3s infinite alternate;
            text-align: center;
            font-weight: 500;
            letter-spacing: 1.5px;
        }
        
        @keyframes gentleGlow {
            from { text-shadow: 0 0 8px #ffbfd5; }
            to { text-shadow: 0 0 22px #ff96b8, 0 0 10px #ffb0c0; }
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }
        
        .modal.show {
            display: flex;
            animation: modalFade 0.4s;
        }
        
        @keyframes modalFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            background: #fffefe;
            max-width: 440px;
            width: 85%;
            padding: 35px;
            border-radius: 50px;
            box-shadow: 0 35px 60px #d98fa8;
            text-align: center;
            transform: scale(0.9);
            animation: modalPop 0.5s forwards;

        function createParticles() {
            clearInterval(particlesInterval);
            const container = document.getElementById('particles');
            particlesInterval = setInterval(() => {
                for (let i = 0; i < 2; i++) {
                    const p = document.createElement('div');
                    const size = Math.random() * 10 + 3;
                    const hue = 340 + Math.random() * 40;
                    p.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        background: radial-gradient(circle, hsl(${hue}, 85%, 80%), hsl(${hue}, 85%, 60%));
                        border-radius: 50%;
                        left: ${Math.random() * 100}%;
                        top: ${Math.random() * 100}%;
                        opacity: ${Math.random() * 0.5 + 0.2};
                        box-shadow: 0 0 ${size * 3}px hsl(${hue}, 85%, 70%);
                        transition: all ${Math.random() * 18 + 12}s linear;
                        pointer-events: none;
                    `;
                    container.appendChild(p);
                    setTimeout(() => {
                        p.style.left = Math.random() * 100 + '%';
                        p.style.top = Math.random() * 100 + '%';
                        p.style.opacity = '0.1';
                    }, 100);
                    setTimeout(() => p.remove(), 20000);
                }
            }, 500);
        }

        function createConfetti(duration = 5000) {
            const layer = document.getElementById('confetti');
            layer.style.display = 'block';
            layer.innerHTML = '';
            const colors = ['#ff8daf', '#ffbc7a', '#ffe07a', '#b2e0b2', '#b2b2ff', '#ffb2d9'];
            let count = 0;
            const interval = setInterval(() => {
                if (count++ > 50) {
                    clearInterval(interval);
                    setTimeout(() => { layer.style.display = 'none'; layer.innerHTML = ''; }, 2000);
                    return;
                }
                const c = document.createElement('div');
                const size = Math.random() * 15 + 6;
                c.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size * (Math.random() > 0.5 ? 2 : 1)}px;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                    left: ${Math.random() * 100}%;
                    top: -30px;
                    opacity: ${Math.random() * 0.9 + 0.1};
                    border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
                    transform: rotate(${Math.random() * 360}deg);
                    transition: top ${Math.random() * 5 + 4}s linear, left 4s;
                    pointer-events: none;
                `;
                layer.appendChild(c);
                setTimeout(() => { c.style.top = '110%'; c.style.left = Math.random() * 80 + 10 + '%'; }, 20);
                setTimeout(() => c.remove(), 8000);

                layer.appendChild(h);
                setTimeout(() => { h.style.bottom = '110%'; h.style.left = Math.random() * 100 + '%'; }, 50);
                setTimeout(() => h.remove(), 10000);

            for (let burst = 0; burst < 6; burst++) {

                            pointer-events: none;

                            p.style.transform = `translate(${Math.cos(angle) * dist}px, ${-Math.sin(angle) * dist}px)`;
                            p.style.opacity = '0';

                }, burst * 300);
            }
            setTimeout(() => { layer.style.display = 'none'; layer.innerHTML = ''; }, 5000);

            clearInterval(heartsInterval);
            createConfetti(5000);
            
            setInterval(() => {
                const span = document.createElement('div');
                span.className = 'birthday-float';
                span.innerText = ['20岁快乐 ✨','平安顺遂 🎈','万事胜意 🎂','永远开心 ❤️','前程似锦 🌟'][Math.floor(Math.random() * 5)];
                span.style.left = Math.random() * 70 + 15 + '%';
                document.body.appendChild(span);
                setTimeout(() => span.remove(), 8000);
            }, 2200);
            
            setTimeout(() => {
                typeContainer.classList.add('show');
                typeWrite(birthdayWords);
            }, 40000);
        };

        function typeWrite(str, i = 0) {
            clearTimeout(typeTimer);
            typeText.textContent = '';
            typeText.style.textAlign = 'center';
            
            const cleanStr = str.trim();
            function run() {
                if (i < cleanStr.length) {
                    typeText.textContent += cleanStr[i];
                    i++;
                    const char = cleanStr[i-1];
                    let delay = 60;
                    if (char === '\n') delay = 250;
                    else if (char === '，' || char === '。' || char === '！' || char === '？') delay = 150;
                    else if (char === ' ') delay = 30;
                    
                    typeTimer = setTimeout(() => run(), delay);
                    
                    setTimeout(() => {
                        typeText.scrollTop = typeText.scrollHeight;
                    }, 10);
                }
            }
            run();
        }

        window.restartCarousel = function() {
            typeContainer.classList.remove('show');
            clearTimeout(typeTimer);
            typeText.textContent = '';
            
            document.querySelectorAll('.carousel-img').forEach(img => {
                img.style.animation = 'none';
                setTimeout(() => img.style.animation = '', 10);
            });
            
            setTimeout(() => {
                document.querySelectorAll('.carousel-img').forEach((img, idx) => {
                    img.style.animationDelay = idx * 4 + 's';
                });
                setTimeout(() => {
                    typeContainer.classList.add('show');
                    typeWrite(birthdayWords);
                }, 40000);
            }, 100);
        };

        window.openModal = (id) => document.getElementById(id + 'Modal').classList.add('show');
        window.closeModal = () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));

        window.onload = function() {
            setTimeout(() => {
                document.getElementById('userInput').focus();
            }, 300);
            createParticles();
            
            document.querySelectorAll('.form-input').forEach(input => {
                input.addEventListener('click', function(e) {
                    this.focus();
                    e.stopPropagation();
                });
            });
        };
    </script>
</body>
</html>
